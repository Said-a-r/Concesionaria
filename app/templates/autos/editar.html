{% extends "base.html" %}

{% block title %}Editar Auto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning">
                <h3 class="mb-0">Editar Auto</h3>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" name="marca" class="form-control" value="{{ auto.get('marca', '') }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Modelo</label>
                            <input type="text" name="modelo" class="form-control" value="{{ auto.get('modelo', '') }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Año</label>
                            <input type="number" name="año" class="form-control" value="{{ auto.get('año', '') }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio (USD)</label>
                            <input type="number" step="0.01" name="precio" class="form-control" value="{{ auto.get('precio', '') }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" name="stock" class="form-control" value="{{ auto.get('stock', '') }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select name="categoria" class="form-select">
                            <option value="Sedán" {% if auto.get('categoria') == 'Sedán' %}selected{% endif %}>Sedán</option>
                            <option value="SUV" {% if auto.get('categoria') == 'SUV' %}selected{% endif %}>SUV</option>
                            <option value="Pickup" {% if auto.get('categoria') == 'Pickup' %}selected{% endif %}>Pickup</option>
                            <option value="Hatchback" {% if auto.get('categoria') == 'Hatchback' %}selected{% endif %}>Hatchback</option>
                            <option value="Deportivo" {% if auto.get('categoria') == 'Deportivo' %}selected{% endif %}>Deportivo</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nueva Imagen (opcional)</label>
                        <input type="file" name="imagen" class="form-control" accept="image/*">
                        <small class="text-muted">Dejar vacío para mantener la imagen actual</small>
                    </div>
                    <button type="submit" class="btn btn-warning">Actualizar Auto</button>
                    <a href="{{ url_for('autos.lista') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
